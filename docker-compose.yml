version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ai_da_postgres
    environment:
      POSTGRES_USER: ai_analyst
      POSTGRES_PASSWORD: secure_password_123
      POSTGRES_DB: ai_data_analyst
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_analyst"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_da_frontend
    environment:
      VITE_API_URL: http://host.docker.internal:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev -- --host
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
