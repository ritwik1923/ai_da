version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ai_da_postgres
    environment:
      POSTGRES_USER: ai_analyst
      POSTGRES_PASSWORD: secure_password_123
      POSTGRES_DB: ai_data_analyst
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_analyst"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_da_backend
    environment:
      DATABASE_URL: postgresql://ai_analyst:secure_password_123@postgres:5432/ai_data_analyst
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ENVIRONMENT: development
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_da_frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host

volumes:
  postgres_data:
